version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fact-postgres
    environment:
      POSTGRES_DB: fact
      POSTGRES_USER: fact
      POSTGRES_PASSWORD: fact
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fact-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
